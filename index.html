<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>알림톡 변수 도구</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 32px 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 28px;
    }

    /* 탭 */
    .tabs {
      display: flex;
      max-width: 900px;
      margin: 0 auto 20px;
      background: #e0e0e0;
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #888;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #fff;
      color: #222;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 공통 카드 */
    .container {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 640px) {
      .container { grid-template-columns: 1fr; }
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #555;
    }

    .card .desc {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.7;
      resize: vertical;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #FEE500; }

    /* 변수 입력 */
    .variables-section { margin-top: 20px; }

    .var-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .var-label {
      flex: 0 0 120px;
      font-size: 13px;
      font-weight: 600;
      color: #3A8AFF;
      background: #EEF4FF;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .var-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .var-input:focus { border-color: #FEE500; }

    .empty-msg {
      font-size: 13px;
      color: #aaa;
      text-align: center;
      padding: 20px 0;
    }

    /* 카카오 말풍선 */
    .preview-wrap {
      background: #B2C7D9;
      border-radius: 8px;
      padding: 20px 16px;
      min-height: 180px;
    }

    .kakao-bubble {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .kakao-bubble .highlight { color: #3A8AFF; font-weight: 600; }

    .no-preview {
      font-size: 13px;
      color: #789;
      text-align: center;
      padding: 40px 0;
    }

    /* 버튼 */
    .yellow-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #FEE500;
      color: #3C1E1E;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 12px;
    }

    .yellow-btn:hover { background: #f0d800; }
    .yellow-btn.copied { background: #4CAF50; color: #fff; }

    /* ── 탭2: 템플릿 만들기 ── */
    .make-wrap {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .token-area {
      font-size: 15px;
      line-height: 2.2;
      word-break: break-all;
      min-height: 60px;
    }

    .token {
      display: inline;
      cursor: pointer;
      border-radius: 4px;
      padding: 2px 0;
      transition: background 0.15s;
    }

    .token:hover { background: #FFF9C4; }

    .token.var-chip {
      background: #EEF4FF;
      color: #3A8AFF;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px dashed #3A8AFF;
    }

    .token.var-chip:hover { background: #dce9ff; }

    .result-box {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 60px;
      color: #333;
    }

    .result-box .var-chip {
      color: #3A8AFF;
      font-weight: 700;
    }

    /* 팝업 */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .popup-overlay.show { display: flex; }

    .popup {
      background: #fff;
      border-radius: 14px;
      padding: 28px 24px;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .popup h3 { font-size: 16px; margin-bottom: 8px; }
    .popup p { font-size: 13px; color: #888; margin-bottom: 16px; }

    .popup input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
    }

    .popup input:focus { border-color: #3A8AFF; }

    .popup-btns { display: flex; gap: 8px; }

    .popup-btns button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .popup-btns .confirm { background: #FEE500; color: #3C1E1E; }
    .popup-btns .cancel { background: #f0f0f0; color: #888; }
  </style>
</head>
<body>

<h1>📢 알림톡 변수 도구</h1>
<p class="subtitle">변수 미리보기 · 템플릿 만들기</p>

<!-- 탭 -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('preview', this)">✅ 변수 미리보기</button>
  <button class="tab-btn" onclick="switchTab('make', this)">✏️ 템플릿 만들기</button>
</div>

<!-- ══════════════ 탭1: 변수 미리보기 ══════════════ -->
<div id="tab-preview" class="tab-content active">
  <div class="container">
    <div>
      <div class="card">
        <h2>템플릿 입력</h2>
        <p class="desc">#{변수명} 형식으로 변수를 입력하세요.</p>
        <textarea id="template" placeholder="예시)&#10;#{이름}님, 안녕하세요!&#10;#{주문번호} 주문이 #{상태} 처리되었습니다.&#10;배송 예정일: #{배송일}"></textarea>
      </div>

      <div class="card variables-section">
        <h2>변수 값 입력</h2>
        <div id="var-list">
          <p class="empty-msg">위에 템플릿을 입력하면<br>변수가 자동으로 나타납니다.</p>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>미리보기</h2>
        <div class="preview-wrap">
          <div id="preview" class="no-preview">템플릿을 입력해 주세요.</div>
        </div>
        <button class="yellow-btn" id="copy-btn" onclick="copyPreview()">복사하기</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ 탭2: 템플릿 만들기 ══════════════ -->
<div id="tab-make" class="tab-content">
  <div class="make-wrap">
    <div class="card">
      <h2>① 실제 메시지 붙여넣기</h2>
      <p class="desc">실제 발송된 메시지를 아래에 붙여넣으세요.</p>
      <textarea id="raw-message" placeholder="예시)&#10;홍길동님, 안녕하세요!&#10;ORD-12345 주문이 배송중 처리되었습니다." oninput="renderTokens()"></textarea>
    </div>

    <div class="card" id="token-card" style="display:none">
      <h2>② 변수로 바꿀 단어 클릭</h2>
      <p class="desc">단어를 클릭하면 변수로 변환됩니다. 변수 칩을 다시 클릭하면 원래 텍스트로 돌아갑니다.</p>
      <div id="token-area" class="token-area"></div>
    </div>

    <div class="card" id="result-card" style="display:none">
      <h2>③ 생성된 템플릿</h2>
      <div id="result-box" class="result-box"></div>
      <button class="yellow-btn" id="copy-template-btn" onclick="copyTemplate()">템플릿 복사하기</button>
    </div>
  </div>
</div>

<!-- 팝업: 변수명 입력 -->
<div class="popup-overlay" id="popup">
  <div class="popup">
    <h3>변수명 입력</h3>
    <p id="popup-desc">선택한 텍스트를 어떤 변수명으로 바꿀까요?</p>
    <input type="text" id="popup-input" placeholder="예: 이름, 주문번호" />
    <div class="popup-btns">
      <button class="cancel" onclick="closePopup()">취소</button>
      <button class="confirm" onclick="confirmVar()">확인</button>
    </div>
  </div>
</div>

<script>
  // ── 탭 전환 ──
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ════════ 탭1: 변수 미리보기 ════════
  const templateEl = document.getElementById('template');
  const varListEl = document.getElementById('var-list');
  const previewEl = document.getElementById('preview');
  let varValues = {};

  templateEl.addEventListener('input', parseTemplate);

  function parseTemplate() {
    const text = templateEl.value;
    const matches = [...new Set(text.match(/#\{[^}]+\}/g) || [])];
    const prevValues = { ...varValues };
    varValues = {};

    if (matches.length === 0) {
      varListEl.innerHTML = '<p class="empty-msg">변수가 없습니다.<br>#{변수명} 형식으로 입력해 주세요.</p>';
      updatePreview();
      return;
    }

    varListEl.innerHTML = '';
    matches.forEach(match => {
      varValues[match] = prevValues[match] || '';
      const row = document.createElement('div');
      row.className = 'var-row';
      row.innerHTML = `
        <span class="var-label">${match}</span>
        <input class="var-input" type="text" placeholder="값 입력" value="${escapeHtml(varValues[match])}">
      `;
      row.querySelector('input').addEventListener('input', e => {
        varValues[match] = e.target.value;
        updatePreview();
      });
      varListEl.appendChild(row);
    });
    updatePreview();
  }

  function updatePreview() {
    const text = templateEl.value;
    if (!text.trim()) {
      previewEl.className = 'no-preview';
      previewEl.textContent = '템플릿을 입력해 주세요.';
      return;
    }
    previewEl.className = 'kakao-bubble';
    let result = text;
    for (const [key, val] of Object.entries(varValues)) {
      const display = val
        ? `<span class="highlight">${escapeHtml(val)}</span>`
        : `<span style="color:#f00;font-weight:600">${escapeHtml(key)}</span>`;
      result = result.split(key).join(display);
    }
    previewEl.innerHTML = result;
  }

  function copyPreview() {
    const text = templateEl.value;
    if (!text.trim()) return;
    let result = text;
    for (const [key, val] of Object.entries(varValues)) {
      result = result.split(key).join(val || key);
    }
    navigator.clipboard.writeText(result).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '복사 완료!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '복사하기'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ════════ 탭2: 템플릿 만들기 ════════
  // tokens: [{type:'text'|'var', value:'원문', varName:'변수명'(var일때)}]
  let tokens = [];
  let clickedTokenIdx = null;

  function renderTokens() {
    const raw = document.getElementById('raw-message').value;
    const tokenCard = document.getElementById('token-card');
    const resultCard = document.getElementById('result-card');

    if (!raw.trim()) {
      tokenCard.style.display = 'none';
      resultCard.style.display = 'none';
      tokens = [];
      return;
    }

    // 기존 토큰이 없으면 새로 파싱 (이미 있으면 유지)
    if (tokens.length === 0) {
      // 공백/줄바꿈을 구분자로 분리하되 구분자도 토큰으로 유지
      const parts = raw.split(/(\s+)/);
      tokens = parts.map(p => ({ type: 'text', value: p, varName: '' }));
    }

    tokenCard.style.display = 'block';
    resultCard.style.display = 'block';
    drawTokens();
  }

  function drawTokens() {
    const area = document.getElementById('token-area');
    area.innerHTML = '';

    tokens.forEach((tok, idx) => {
      const span = document.createElement('span');

      if (/^\s+$/.test(tok.value)) {
        // 공백/줄바꿈은 그대로
        span.style.whiteSpace = 'pre';
        span.textContent = tok.value;
      } else if (tok.type === 'var') {
        span.className = 'token var-chip';
        span.textContent = `#{${tok.varName}}`;
        span.title = `클릭하면 "${tok.value}"로 되돌립니다`;
        span.onclick = () => revertToken(idx);
      } else {
        span.className = 'token';
        span.textContent = tok.value;
        span.title = '클릭하면 변수로 변환';
        span.onclick = () => clickToken(idx);
      }

      area.appendChild(span);
    });

    syncResult();
  }

  function clickToken(idx) {
    clickedTokenIdx = idx;
    const input = document.getElementById('popup-input');
    input.value = '';
    document.getElementById('popup-desc').textContent =
      `"${tokens[idx].value}"를 어떤 변수명으로 바꿀까요?`;
    document.getElementById('popup').classList.add('show');
    setTimeout(() => input.focus(), 100);
    input.onkeydown = e => {
      if (e.key === 'Enter') confirmVar();
      if (e.key === 'Escape') closePopup();
    };
  }

  function revertToken(idx) {
    tokens[idx].type = 'text';
    tokens[idx].varName = '';
    drawTokens();
  }

  function openPopup() {}  // 탭1용 (미사용)

  function closePopup() {
    document.getElementById('popup').classList.remove('show');
    clickedTokenIdx = null;
  }

  function confirmVar() {
    const name = document.getElementById('popup-input').value.trim();
    if (!name) { closePopup(); return; }

    if (clickedTokenIdx !== null) {
      tokens[clickedTokenIdx].type = 'var';
      tokens[clickedTokenIdx].varName = name;
      closePopup();
      drawTokens();
    }
  }

  function syncResult() {
    const resultBox = document.getElementById('result-box');
    let html = '';
    let plain = '';

    tokens.forEach(tok => {
      if (/^\s+$/.test(tok.value)) {
        html += escapeHtml(tok.value).replace(/\n/g, '<br>');
        plain += tok.value;
      } else if (tok.type === 'var') {
        const v = `#{${tok.varName}}`;
        html += `<span class="var-chip">${escapeHtml(v)}</span>`;
        plain += v;
      } else {
        html += escapeHtml(tok.value);
        plain += tok.value;
      }
    });

    resultBox.innerHTML = html || '';
    resultBox.dataset.plain = plain;
  }

  function copyTemplate() {
    const text = document.getElementById('result-box').dataset.plain || '';
    if (!text.trim()) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-template-btn');
      btn.textContent = '복사 완료!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '템플릿 복사하기'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
